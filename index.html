<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Textbook AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Bengali:wght@400;500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }
        
        .bengali-text {
            font-family: 'Noto Sans Bengali', sans-serif;
        }
        
        .speech-bubble {
            position: relative;
            border-radius: 1rem;
            padding: 1rem;
            margin: 0.5rem 0;
        }
        
        .speech-bubble::before {
            content: '';
            position: absolute;
            left: -10px;
            top: 20px;
            border: 10px solid transparent;
            border-right-color: inherit;
        }
        
        .family-tree-line {
            position: relative;
        }
        
        .family-tree-line::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            width: 2px;
            height: 20px;
            background-color: #3b82f6;
            transform: translateX(-50%);
        }
        
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        
        .accordion-content.open {
            max-height: 1000px;
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useContext, createContext } = React;
        
        // Set up PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        // Icons component wrapper
        const Icon = ({ name, size = 20, className = "" }) => {
            const IconComponent = window.lucide[name];
            return IconComponent ? <IconComponent size={size} className={className} /> : null;
        };

        // Context for settings
        const SettingsContext = createContext();

        // Settings Provider
        const SettingsProvider = ({ children }) => {
            const [settings, setSettings] = useState(() => {
                const saved = localStorage.getItem('textbookAI_settings');
                return saved ? JSON.parse(saved) : {
                    provider: 'openai',
                    apiKey: ''
                };
            });

            useEffect(() => {
                localStorage.setItem('textbookAI_settings', JSON.stringify(settings));
            }, [settings]);

            return (
                <SettingsContext.Provider value={{ settings, setSettings }}>
                    {children}
                </SettingsContext.Provider>
            );
        };

        // AI Helper Function
        const askAI = async (prompt, lessonContext, provider, apiKey) => {
            if (!apiKey) throw new Error('API key not configured');
            
            const fullPrompt = `${prompt}\n\nLesson Text:\n${lessonContext}`;
            
            try {
                if (provider === 'openai') {
                    const response = await fetch('https://api.openai.com/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify({
                            model: 'gpt-4o-mini',
                            messages: [
                                { role: 'system', content: 'You are an English textbook assistant for students. Always answer based only on the lesson text provided.' },
                                { role: 'user', content: fullPrompt }
                            ],
                            temperature: 0.7
                        })
                    });
                    const data = await response.json();
                    return data.choices[0].message.content;
                    
                } else if (provider === 'gemini') {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: fullPrompt }] }]
                        })
                    });
                    const data = await response.json();
                    return data.candidates[0].content.parts[0].text;
                    
                } else if (provider === 'claude') {
                    const response = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'x-api-key': apiKey,
                            'anthropic-version': '2023-06-01'
                        },
                        body: JSON.stringify({
                            model: 'claude-3-haiku-20240307',
                            max_tokens: 1000,
                            messages: [{ role: 'user', content: fullPrompt }]
                        })
                    });
                    const data = await response.json();
                    return data.content[0].text;
                }
            } catch (error) {
                console.error('AI Error:', error);
                throw error;
            }
        };

        // Settings Panel Component
        const SettingsPanel = ({ isOpen, onClose }) => {
            const { settings, setSettings } = useContext(SettingsContext);
            const [localSettings, setLocalSettings] = useState(settings);
            const [saved, setSaved] = useState(false);

            const handleSave = () => {
                setSettings(localSettings);
                setSaved(true);
                setTimeout(() => setSaved(false), 2000);
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl shadow-xl max-w-md w-full p-6">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-xl font-bold text-gray-800">Settings</h2>
                            <button onClick={onClose} className="p-2 hover:bg-gray-100 rounded-full transition">
                                <Icon name="X" size={20} />
                            </button>
                        </div>

                        <div className="space-y-6">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-3">AI Provider</label>
                                <div className="space-y-2">
                                    {[
                                        { id: 'openai', label: 'OpenAI (ChatGPT)', url: 'api.openai.com' },
                                        { id: 'gemini', label: 'Google Gemini', url: 'generativelanguage.googleapis.com' },
                                        { id: 'claude', label: 'Anthropic Claude', url: 'api.anthropic.com' }
                                    ].map((provider) => (
                                        <label key={provider.id} className="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50 transition">
                                            <input
                                                type="radio"
                                                name="provider"
                                                value={provider.id}
                                                checked={localSettings.provider === provider.id}
                                                onChange={(e) => setLocalSettings({...localSettings, provider: e.target.value})}
                                                className="mr-3 text-indigo-600"
                                            />
                                            <div>
                                                <div className="font-medium text-sm">{provider.label}</div>
                                                <div className="text-xs text-gray-500">{provider.url}</div>
                                            </div>
                                        </label>
                                    ))}
                                </div>
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">API Key</label>
                                <input
                                    type="password"
                                    value={localSettings.apiKey}
                                    onChange={(e) => setLocalSettings({...localSettings, apiKey: e.target.value})}
                                    placeholder="Paste your API key here"
                                    className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none"
                                />
                                <p className="text-xs text-gray-500 mt-1">Stored locally in your browser only</p>
                            </div>

                            <button
                                onClick={handleSave}
                                className="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition flex items-center justify-center gap-2"
                            >
                                <Icon name="Save" size={18} />
                                Save Settings
                                {saved && <span className="ml-2 text-green-200">✓ Saved!</span>}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // PDF Uploader Component
        const PDFUploader = ({ onUpload }) => {
            const [isDragging, setIsDragging] = useState(false);
            const [loading, setLoading] = useState(false);
            const fileInputRef = useRef(null);

            const extractTextFromPDF = async (file) => {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let fullText = '';
                
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(' ');
                    fullText += pageText + '\n\n';
                }
                
                return fullText;
            };

            const parseLessons = (text) => {
                // Look for patterns like "Unit 1", "Lesson 2", "Chapter 3"
                const unitPattern = /(?:Unit|Lesson|Chapter)\s*\d+[:.\s][^\n]+/gi;
                const matches = text.match(unitPattern) || [];
                
                if (matches.length === 0) {
                    // If no units found, split by double newlines into chunks
                    return text.split(/\n\s*\n/).filter(t => t.trim().length > 100).map((content, idx) => ({
                        id: idx,
                        title: `Lesson ${idx + 1}`,
                        content: content.trim()
                    }));
                }
                
                const lessons = [];
                let lastIndex = 0;
                
                matches.forEach((match, idx) => {
                    const startIdx = text.indexOf(match, lastIndex);
                    const endIdx = idx < matches.length - 1 ? text.indexOf(matches[idx + 1], startIdx + 1) : text.length;
                    const content = text.slice(startIdx, endIdx).trim();
                    
                    lessons.push({
                        id: idx,
                        title: match.trim(),
                        content: content
                    });
                    
                    lastIndex = startIdx + 1;
                });
                
                return lessons;
            };

            const handleFile = async (file) => {
                if (file.type !== 'application/pdf') {
                    alert('Please upload a PDF file');
                    return;
                }
                
                setLoading(true);
                try {
                    const text = await extractTextFromPDF(file);
                    const lessons = parseLessons(text);
                    onUpload(lessons);
                } catch (error) {
                    console.error('Error parsing PDF:', error);
                    alert('Error reading PDF. Please try again.');
                } finally {
                    setLoading(false);
                }
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setIsDragging(false);
                const file = e.dataTransfer.files[0];
                if (file) handleFile(file);
            };

            return (
                <div className="max-w-2xl mx-auto">
                    <div
                        onClick={() => fileInputRef.current?.click()}
                        onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }}
                        onDragLeave={() => setIsDragging(false)}
                        onDrop={handleDrop}
                        className={`border-2 border-dashed rounded-2xl p-12 text-center cursor-pointer transition-all ${
                            isDragging 
                                ? 'border-indigo-500 bg-indigo-50' 
                                : 'border-gray-300 hover:border-gray-400 bg-white'
                        }`}
                    >
                        {loading ? (
                            <div className="flex flex-col items-center">
                                <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mb-4"></div>
                                <p className="text-gray-600">Reading PDF...</p>
                            </div>
                        ) : (
                            <>
                                <div className="mx-auto w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mb-4">
                                    <Icon name="Upload" size={32} className="text-indigo-600" />
                                </div>
                                <h3 className="text-lg font-semibold text-gray-800 mb-2">
                                    Upload your English Textbook
                                </h3>
                                <p className="text-gray-500 mb-4">
                                    Drag and drop your PDF here, or click to browse
                                </p>
                                <span className="text-sm text-gray-400">Supports PDF files only</span>
                            </>
                        )}
                        <input
                            ref={fileInputRef}
                            type="file"
                            accept=".pdf"
                            onChange={(e) => e.target.files?.[0] && handleFile(e.target.files[0])}
                            className="hidden"
                        />
                    </div>
                </div>
            );
        };

        // Family Tree Box Component
        const FamilyTreeBox = ({ lessonContent, settings }) => {
            const [familyData, setFamilyData] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const detectFamily = async () => {
                    // Check if content has family-related words
                    const familyWords = ['father', 'mother', 'son', 'daughter', 'brother', 'sister', 'uncle', 'aunt', 'grandfather', 'grandmother', 'grandson', 'granddaughter', 'family'];
                    const hasFamily = familyWords.some(word => lessonContent.toLowerCase().includes(word));
                    
                    if (!hasFamily) {
                        setLoading(false);
                        return;
                    }

                    try {
                        const prompt = `From this lesson text, extract all characters and their family relationships.
Return JSON only:
{
  "characters": [
    { "name": "...", "role": "father/mother/son/daughter/etc", "parent_of": ["..."] }
  ]
}`;
                        const response = await askAI(prompt, lessonContent, settings.provider, settings.apiKey);
                        const jsonMatch = response.match(/\{[\s\S]*\}/);
                        if (jsonMatch) {
                            const parsed = JSON.parse(jsonMatch[0]);
                            setFamilyData(parsed);
                        }
                    } catch (error) {
                        console.error('Error parsing family tree:', error);
                    } finally {
                        setLoading(false);
                    }
                };

                detectFamily();
            }, [lessonContent, settings]);

            if (loading) return <div className="text-center py-4 text-gray-500">Analyzing characters...</div>;
            if (!familyData || !familyData.characters || familyData.characters.length === 0) return null;

            // Organize by generations
            const parents = familyData.characters.filter(c => c.role === 'father' || c.role === 'mother');
            const children = familyData.characters.filter(c => ['son', 'daughter'].includes(c.role));

            const getInitials = (name) => name.split(' ').map(n => n[0]).join('').toUpperCase();

            return (
                <div className="bg-blue-50 border-2 border-blue-500 rounded-xl p-6 mb-6">
                    <div className="flex flex-col items-center">
                        {/* Parents Generation */}
                        <div className="flex gap-8 mb-8">
                            {parents.map((parent, idx) => (
                                <div key={idx} className="flex flex-col items-center family-tree-line">
                                    <div className="w-16 h-16 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold text-lg shadow-md">
                                        {getInitials(parent.name)}
                                    </div>
                                    <div className="mt-2 text-center">
                                        <div className="font-semibold text-gray-800">{parent.name}</div>
                                        <div className="text-xs text-blue-600 capitalize">{parent.role}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                        
                        {/* Connecting Line */}
                        {parents.length > 0 && children.length > 0 && (
                            <div className="w-px h-8 bg-blue-500 mb-2"></div>
                        )}
                        
                        {/* Children Generation */}
                        <div className="flex gap-6">
                            {children.map((child, idx) => (
                                <div key={idx} className="flex flex-col items-center relative">
                                    <div className="absolute -top-4 left-1/2 w-px h-4 bg-blue-500 transform -translate-x-1/2"></div>
                                    <div className="w-14 h-14 bg-blue-400 rounded-full flex items-center justify-center text-white font-bold shadow-md">
                                        {getInitials(child.name)}
                                    </div>
                                    <div className="mt-2 text-center">
                                        <div className="font-medium text-gray-800 text-sm">{child.name}</div>
                                        <div className="text-xs text-blue-500 capitalize">{child.role}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                    <p className="text-center text-gray-500 italic text-sm mt-4">Characters in this story</p>
                </div>
            );
        };

        // Lesson Essence Card Component
        const LessonEssenceCard = ({ lesson, onReadComplete, settings }) => {
            const [essence, setEssence] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const generateEssence = async () => {
                    try {
                        const prompt = `Read this lesson text and give me:
1. A one-line theme title
2. 3 to 5 key takeaways as bullet points
Keep it simple for a student.

Format your response exactly as:
Title: [theme title]
- [point 1]
- [point 2]
- [point 3]`;
                        
                        const response = await askAI(prompt, lesson.content, settings.provider, settings.apiKey);
                        
                        const lines = response.split('\n').filter(l => l.trim());
                        const title = lines.find(l => l.toLowerCase().startsWith('title:'))?.replace(/title:/i, '').trim() || 'Lesson Overview';
                        const takeaways = lines.filter(l => l.trim().startsWith('-')).map(l => l.replace(/^-/, '').trim());
                        
                        setEssence({ title, takeaways });
                    } catch (error) {
                        console.error('Error generating essence:', error);
                        setEssence({ 
                            title: lesson.title, 
                            takeaways: ['Key points will appear here once AI is configured'] 
                        });
                    } finally {
                        setLoading(false);
                    }
                };

                generateEssence();
            }, [lesson, settings]);

            if (loading) {
                return (
                    <div className="bg-amber-50 border-2 border-amber-500 rounded-xl p-8 mb-6 animate-pulse">
                        <div className="h-6 bg-amber-200 rounded w-3/4 mb-4"></div>
                        <div className="space-y-2">
                            <div className="h-4 bg-amber-200 rounded w-full"></div>
                            <div className="h-4 bg-amber-200 rounded w-5/6"></div>
                            <div className="h-4 bg-amber-200 rounded w-4/6"></div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="bg-amber-50 border-2 border-amber-500 rounded-xl p-8 mb-6 shadow-sm">
                    <div className="flex items-center gap-2 mb-4">
                        <Icon name="Sparkles" className="text-amber-600" size={24} />
                        <h2 className="text-xl font-bold text-amber-900">Lesson Essence</h2>
                    </div>
                    
                    <h3 className="text-lg font-semibold text-gray-800 mb-4">{essence.title}</h3>
                    
                    <ul className="space-y-3 mb-6">
                        {essence.takeaways.map((point, idx) => (
                            <li key={idx} className="flex items-start gap-3 text-gray-700">
                                <span className="inline-flex items-center justify-center w-6 h-6 rounded-full bg-amber-200 text-amber-800 text-sm font-bold flex-shrink-0">
                                    {idx + 1}
                                </span>
                                <span className="leading-relaxed">{point}</span>
                            </li>
                        ))}
                    </ul>
                    
                    <button
                        onClick={onReadComplete}
                        className="w-full bg-amber-500 text-white py-3 rounded-lg font-semibold hover:bg-amber-600 transition flex items-center justify-center gap-2"
                    >
                        <span>I have Read This — Show Full Lesson</span>
                        <Icon name="ArrowRight" size={18} />
                    </button>
                </div>
            );
        };

        // Dialogue Bubble Component
        const DialogueBubble = ({ line, colorIndex }) => {
            const colors = [
                { bg: 'bg-indigo-100', border: 'border-indigo-300', text: 'text-indigo-800', badge: 'bg-indigo-600' },
                { bg: 'bg-emerald-100', border: 'border-emerald-300', text: 'text-emerald-800', badge: 'bg-emerald-600' },
                { bg: 'bg-rose-100', border: 'border-rose-300', text: 'text-rose-800', badge: 'bg-rose-600' },
                { bg: 'bg-amber-100', border: 'border-amber-300', text: 'text-amber-800', badge: 'bg-amber-600' }
            ];
            const theme = colors[colorIndex % colors.length];
            
            // Parse "Name: Dialogue" or "Dialogue" with quotes
            const colonMatch = line.match(/^([^:]+):\s*(.+)$/);
            const quoteMatch = line.match(/^["'](.+)["']$/);
            
            let speaker = 'Narrator';
            let text = line;
            
            if (colonMatch) {
                speaker = colonMatch[1].trim();
                text = colonMatch[2].trim();
            } else if (quoteMatch) {
                text = quoteMatch[1];
            }

            return (
                <div className="flex items-start gap-4 mb-4">
                    <div className={`${theme.badge} text-white px-3 py-1 rounded-full text-sm font-bold flex-shrink-0 mt-1`}>
                        {speaker}
                    </div>
                    <div className={`${theme.bg} ${theme.border} border rounded-2xl rounded-tl-none px-4 py-3 flex-1 ${theme.text}`}>
                        {text.replace(/^["']|["']$/g, '')}
                    </div>
                </div>
            );
        };

        // Lesson Reader Component
        const LessonReader = ({ lesson }) => {
            const renderContent = (text) => {
                const lines = text.split('\n').filter(line => line.trim());
                
                return lines.map((line, idx) => {
                    // Check if line is dialogue (contains quotes or colon pattern)
                    const isDialogue = /^[^:":]+:\s*["']/.test(line) || /^["']/.test(line) || /^[^:]+:\s+/.test(line);
                    
                    if (isDialogue && line.length < 300) {
                        return <DialogueBubble key={idx} line={line} colorIndex={idx} />;
                    }
                    
                    return <p key={idx} className="mb-4 text-gray-700 leading-[1.8] text-[18px]">{line}</p>;
                });
            };

            return (
                <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
                    <h2 className="text-2xl font-bold text-gray-800 mb-6">{lesson.title}</h2>
                    <div className="prose max-w-none">
                        {renderContent(lesson.content)}
                    </div>
                </div>
            );
        };

        // Q&A Accordion Card Component
        const QAAccordionCard = ({ item, index }) => {
            const [isOpen, setIsOpen] = useState(index === 0);
            const [showBengali, setShowBengali] = useState(true);

            return (
                <div className="border border-gray-200 rounded-xl mb-3 overflow-hidden bg-white">
                    <button
                        onClick={() => setIsOpen(!isOpen)}
                        className="w-full px-6 py-4 flex items-center justify-between bg-gray-50 hover:bg-gray-100 transition text-left"
                    >
                        <span className="font-semibold text-gray-800 flex items-center gap-3">
                            <span className="w-8 h-8 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-sm font-bold">
                                {index + 1}
                            </span>
                            <span>Q: {item.question}</span>
                        </span>
                        <Icon 
                            name={isOpen ? "ChevronUp" : "ChevronDown"} 
                            size={20} 
                            className="text-gray-500" 
                        />
                    </button>
                    
                    <div className={`accordion-content ${isOpen ? 'open' : ''} bg-white`}>
                        <div className="p-6 space-y-4">
                            <div>
                                <div className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">English Answer:</div>
                                <p className="text-gray-800 text-lg leading-relaxed">{item.english}</p>
                            </div>
                            
                            <div className="border-t pt-4">
                                <div className="flex items-center justify-between mb-2">
                                    <div className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Bengali Answer:</div>
                                    <button
                                        onClick={() => setShowBengali(!showBengali)}
                                        className="text-xs text-indigo-600 hover:text-indigo-800 font-medium"
                                    >
                                        {showBengali ? 'Hide' : 'Show'} Bengali
                                    </button>
                                </div>
                                {showBengali && (
                                    <p className="bengali-text text-gray-600 text-base italic leading-relaxed">
                                        {item.bengali}
                                    </p>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Q&A Panel Component
        const QAPanel = ({ lesson, settings }) => {
            const [qaList, setQaList] = useState([]);
            const [loading, setLoading] = useState(true);
            const [generatingMore, setGeneratingMore] = useState(false);

            const generateQA = async (count = 6) => {
                try {
                    const prompt = `Based on this lesson, generate ${count} important comprehension questions with answers.
For each, provide:
- The question
- Answer in English
- Answer in Bengali (translated)
Format as JSON array:
[{ "question": "...", "english": "...", "bengali": "..." }]`;
                    
                    const response = await askAI(prompt, lesson.content, settings.provider, settings.apiKey);
                    const jsonMatch = response.match(/\[[\s\S]*\]/);
                    if (jsonMatch) {
                        const newQA = JSON.parse(jsonMatch[0]);
                        setQaList(prev => [...prev, ...newQA]);
                    }
                } catch (error) {
                    console.error('Error generating QA:', error);
                }
            };

            useEffect(() => {
                const init = async () => {
                    setLoading(true);
                    await generateQA();
                    setLoading(false);
                };
                init();
            }, [lesson, settings]);

            const handleGenerateMore = async () => {
                setGeneratingMore(true);
                await generateQA(3);
                setGeneratingMore(false);
            };

            if (loading) {
                return (
                    <div className="mt-8">
                        <h3 className="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                            <Icon name="HelpCircle" className="text-indigo-600" />
                            Important Questions
                        </h3>
                        <div className="space-y-3">
                            {[1,2,3].map(i => (
                                <div key={i} className="h-20 bg-gray-100 rounded-xl animate-pulse"></div>
                            ))}
                        </div>
                    </div>
                );
            }

            return (
                <div className="mt-8">
                    <h3 className="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                        <Icon name="HelpCircle" className="text-indigo-600" />
                        Important Questions & Answers
                    </h3>
                    
                    <div className="space-y-3">
                        {qaList.map((item, idx) => (
                            <QAAccordionCard key={idx} item={item} index={idx} />
                        ))}
                    </div>
                    
                    <button
                        onClick={handleGenerateMore}
                        disabled={generatingMore}
                        className="mt-4 w-full py-3 border-2 border-dashed border-gray-300 rounded-xl text-gray-600 hover:border-indigo-500 hover:text-indigo-600 transition flex items-center justify-center gap-2 disabled:opacity-50"
                    >
                        {generatingMore ? (
                            <>
                                <div className="animate-spin rounded-full h-5 w-5 border-b-2 border-indigo-600"></div>
                                Generating...
                            </>
                        ) : (
                            <>
                                <Icon name="Plus" size={20} />
                                Generate More Questions
                            </>
                        )}
                    </button>
                </div>
            );
        };

        // Ask Question Box Component
        const AskQuestionBox = ({ lesson, settings }) => {
            const [question, setQuestion] = useState('');
            const [history, setHistory] = useState([]);
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!question.trim()) return;

                setLoading(true);
                try {
                    const prompt = `Answer this question about the lesson in English and Bengali.
Question: ${question}

Format your response exactly as:
English: [answer here]
Bengali: [Bengali translation of the answer here]`;
                    
                    const response = await askAI(prompt, lesson.content, settings.provider, settings.apiKey);
                    
                    const englishMatch = response.match(/English:\s*(.+?)(?=\n*Bengali:|$)/s);
                    const bengaliMatch = response.match(/Bengali:\s*(.+)$/s);
                    
                    const newEntry = {
                        question,
                        english: englishMatch ? englishMatch[1].trim() : response,
                        bengali: bengaliMatch ? bengaliMatch[1].trim() : 'Translation not available'
                    };
                    
                    setHistory(prev => [newEntry, ...prev].slice(0, 5));
                    setQuestion('');
                } catch (error) {
                    alert('Error getting answer. Please check your API settings.');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="mt-8 bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                    <h3 className="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                        <Icon name="MessageCircle" className="text-indigo-600" />
                        Ask Your Own Question
                    </h3>
                    
                    <form onSubmit={handleSubmit} className="mb-6">
                        <div className="flex gap-2">
                            <input
                                type="text"
                                value={question}
                                onChange={(e) => setQuestion(e.target.value)}
                                placeholder="Ask anything about this lesson..."
                                className="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none"
                            />
                            <button
                                type="submit"
                                disabled={loading || !question.trim()}
                                className="bg-indigo-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-indigo-700 transition disabled:opacity-50 flex items-center gap-2"
                            >
                                {loading ? (
                                    <div className="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div>
                                ) : (
                                    <Icon name="Send" size={20} />
                                )}
                                Ask
                            </button>
                        </div>
                    </form>
                    
                    <div className="space-y-4 max-h-96 overflow-y-auto">
                        {history.map((item, idx) => (
                            <div key={idx} className="bg-gray-50 rounded-lg p-4 border border-gray-100">
                                <div className="font-semibold text-gray-800 mb-3 flex items-center gap-2">
                                    <Icon name="User" size={16} className="text-indigo-600" />
                                    {item.question}
                                </div>
                                <div className="space-y-3">
                                    <div className="bg-white p-3 rounded border-l-4 border-indigo-500">
                                        <div className="text-xs font-bold text-indigo-600 mb-1">ENGLISH</div>
                                        <div className="text-gray-800">{item.english}</div>
                                    </div>
                                    <div className="bg-white p-3 rounded border-l-4 border-gray-400">
                                        <div className="text-xs font-bold text-gray-600 mb-1">বাংলা</div>
                                        <div className="bengali-text text-gray-600 italic text-base">{item.bengali}</div>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // Main App Component
        const App = () => {
            const [lessons, setLessons] = useState([]);
            const [selectedLesson, setSelectedLesson] = useState(null);
            const [showFullLesson, setShowFullLesson] = useState(false);
            const [settingsOpen, setSettingsOpen] = useState(false);
            const { settings } = useContext(SettingsContext);

            const handleUpload = (parsedLessons) => {
                setLessons(parsedLessons);
                setSelectedLesson(null);
                setShowFullLesson(false);
            };

            const handleSelectLesson = (lesson) => {
                setSelectedLesson(lesson);
                setShowFullLesson(false);
            };

            return (
                <div className="min-h-screen bg-[#f8f9fa]">
                    {/* Header */}
                    <header className="bg-white border-b border-gray-200 sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center">
                                    <Icon name="BookOpen" className="text-white" size={24} />
                                </div>
                                <h1 className="text-xl font-bold text-gray-900">Textbook AI</h1>
                            </div>
                            
                            <button
                                onClick={() => setSettingsOpen(true)}
                                className="p-2 hover:bg-gray-100 rounded-full transition"
                            >
                                <Icon name="Settings" size={24} className="text-gray-600" />
                            </button>
                        </div>
                    </header>

                    <SettingsPanel isOpen={settingsOpen} onClose={() => setSettingsOpen(false)} />

                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        {!lessons.length ? (
                            <div className="mt-12">
                                <div className="text-center mb-8">
                                    <h2 className="text-3xl font-bold text-gray-800 mb-2">Start Learning</h2>
                                    <p className="text-gray-600">Upload your English textbook PDF to get started with AI-powered summaries and Q&A</p>
                                </div>
                                <PDFUploader onUpload={handleUpload} />
                            </div>
                        ) : (
                            <div className="flex gap-8">
                                {/* Sidebar - Lesson List */}
                                <aside className="w-64 flex-shrink-0">
                                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-4 sticky top-24">
                                        <h3 className="font-bold text-gray-800 mb-4 flex items-center gap-2">
                                            <Icon name="List" size={18} />
                                            Lessons
                                        </h3>
                                        <div className="space-y-2 max-h-[calc(100vh-200px)] overflow-y-auto">
                                            {lessons.map((lesson) => (
                                                <button
                                                    key={lesson.id}
                                                    onClick={() => handleSelectLesson(lesson)}
                                                    className={`w-full text-left p-3 rounded-lg transition text-sm ${
                                                        selectedLesson?.id === lesson.id
                                                            ? 'bg-indigo-50 border-indigo-200 border text-indigo-700'
                                                            : 'hover:bg-gray-50 text-gray-700 border border-transparent'
                                                    }`}
                                                >
                                                    {lesson.title}
                                                </button>
                                            ))}
                                        </div>
                                        <button
                                            onClick={() => { setLessons([]); setSelectedLesson(null); }}
                                            className="mt-4 w-full py-2 text-sm text-gray-500 hover:text-gray-700 border border-dashed border-gray-300 rounded-lg hover:border-gray-400 transition"
                                        >
                                            Upload New PDF
                                        </button>
                                    </div>
                                </aside>

                                {/* Main Content */}
                                <div className="flex-1 max-w-4xl">
                                    {!selectedLesson ? (
                                        <div className="text-center py-20 bg-white rounded-xl border border-dashed border-gray-300">
                                            <Icon name="Book" size={48} className="mx-auto text-gray-300 mb-4" />
                                            <p className="text-gray-500">Select a lesson from the sidebar to begin</p>
                                        </div>
                                    ) : !showFullLesson ? (
                                        <LessonEssenceCard 
                                            lesson={selectedLesson} 
                                            onReadComplete={() => setShowFullLesson(true)}
                                            settings={settings}
                                        />
                                    ) : (
                                        <>
                                            <FamilyTreeBox 
                                                lessonContent={selectedLesson.content} 
                                                settings={settings}
                                            />
                                            <LessonReader lesson={selectedLesson} />
                                            <QAPanel lesson={selectedLesson} settings={settings} />
                                            <AskQuestionBox lesson={selectedLesson} settings={settings} />
                                        </>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <SettingsProvider>
                <App />
            </SettingsProvider>
        );
    </script>
</body>
</html>
